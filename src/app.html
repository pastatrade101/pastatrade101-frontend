<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Pastatrade Crypto Intelligence — see where liquidity is rotating before the crowd."
    />
    <script>
      // Apply the saved theme before paint to avoid a flash of the wrong mode.
      try {
        document.documentElement.setAttribute('data-theme', localStorage.getItem('pastatrade_theme') || 'dark');
      } catch (e) {}
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
